<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer Architect v2 | Elite Builder</title>
    <!-- Modern typography and icon libraries -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #030304;
            --card-black: #0b0b0f;
            --primary-cyan: #00F2FE;
            --primary-purple: #4FACFE;
            --accent-cyan: #00d9ff;
            --subtext: #9096a2;
            --glow-cyan: rgba(0, 242, 254, 0.15);
            --glow-purple: rgba(79, 172, 254, 0.15);
            --surface-border: rgba(255, 255, 255, 0.06);
            --input-surface: #111118;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-black);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Advanced Animated Grid and Spotlights Background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.03) 1px, transparent 0);
            background-size: 30px 30px;
            mask-image: linear-gradient(to bottom, transparent, black, transparent);
            -webkit-mask-image: radial-gradient(ellipse at top, black 10%, transparent 90%);
            pointer-events: none;
            z-index: -2;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            z-index: -1;
            pointer-events: none;
            animation: floatGlow 20s infinite alternate;
        }

        .glow-1 {
            background: var(--primary-cyan);
            top: -200px;
            left: -200px;
        }

        .glow-2 {
            background: var(--primary-purple);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* Main Wrapper Layout */
        .main-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            opacity: 0;
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Navbar/Header area */
        .app-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary-cyan), var(--primary-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px var(--glow-cyan);
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .signature-control {
            background: var(--card-black);
            border: 1px solid var(--surface-border);
            border-radius: 100px;
            display: flex;
            align-items: center;
            padding: 6px 6px 6px 16px;
            gap: 10px;
            transition: 0.3s;
        }

        .signature-control:focus-within {
            border-color: rgba(0, 242, 254, 0.3);
            box-shadow: 0 0 20px var(--glow-cyan);
        }

        .sig-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--subtext);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sig-input-wrapper {
            display: flex;
            align-items: center;
            background: var(--input-surface);
            border: 1px solid var(--surface-border);
            border-radius: 100px;
            padding: 6px 14px;
        }

        .sig-input-wrapper span {
            color: var(--primary-cyan);
            font-weight: 700;
            margin-right: 4px;
        }

        .sig-input {
            background: transparent;
            border: none;
            color: white;
            font-family: inherit;
            font-weight: 600;
            outline: none;
            width: 120px;
            font-size: 14px;
        }

        /* Dashboard Container: Grid for Desktop, Single column for Mobile */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Reusable Component Card Styles */
        .glass-card {
            background: linear-gradient(160deg, #111118 0%, #09090d 100%);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 32px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Light streak hover effect for card border via pseudo-element */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f8fafc;
        }

        .bullet-decor {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--primary-cyan);
            box-shadow: 0 0 10px var(--primary-cyan);
        }

        .char-pill {
            background: rgba(255,255,255,0.03);
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 11px;
            color: var(--subtext);
            border: 1px solid var(--surface-border);
        }

        /* Interactive Elements styling */
        .editor-textarea {
            width: 100%;
            height: 300px;
            background: var(--input-surface);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 20px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .editor-textarea:focus {
            border-color: var(--primary-cyan);
            box-shadow: 0 0 30px -10px var(--glow-cyan);
            background: #13131c;
        }

        .editor-textarea::placeholder {
            color: #475569;
        }

        /* Output Screen Special Visuals */
        .output-display {
            background: #07070a;
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            height: 300px;
            padding: 20px;
            color: #cbd5e1;
            font-family: 'Consolas', 'Monaco', 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
            overflow-y: auto;
            white-space: pre-wrap;
            position: relative;
            transition: all 0.5s;
        }

        /* Loading Placeholder overlay inside output */
        .empty-state {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            color: #334155;
            font-family: 'Outfit', sans-serif;
        }

        .empty-icon {
            width: 48px; height: 48px; opacity: 0.3;
        }

        /* Actions Styling */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr;
            margin-top: auto;
        }

        .master-btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Glowing Cyan Build Button */
        .btn-build {
            background: linear-gradient(to right, #00F2FE, #4FACFE);
            color: #000000;
            box-shadow: 0 10px 30px -10px rgba(0, 242, 254, 0.5);
        }

        .btn-build:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -10px rgba(0, 242, 254, 0.6);
        }

        .btn-build:disabled {
            filter: grayscale(1) opacity(0.5);
            cursor: not-allowed;
        }

        /* Holographic Outline Copy Button */
        .btn-copy {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--surface-border);
            color: #f8fafc;
        }

        .btn-copy:hover:not(.inactive) {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
        }

        .btn-copy.success-anim {
            background: #10b981;
            color: #fff;
            border-color: transparent;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }

        .inactive {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Shimmer Effect Element on Button */
        .shimmer {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(30deg);
            transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
            left: -200%;
        }

        .master-btn:hover .shimmer {
            left: 100%;
        }

        /* Core Spinner for API fetching */
        .dual-ring-loader {
            display: inline-block;
            width: 20px;
            height: 20px;
        }
        .dual-ring-loader:after {
            content: " ";
            display: block;
            width: 16px; height: 16px;
            border-radius: 50%;
            border: 2.5px solid #000;
            border-color: #000 transparent #000 transparent;
            animation: dual-ring-loader 0.8s linear infinite;
        }
        @keyframes dual-ring-loader {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Typing status/flashing cursor effect */
        .active-build-border {
            animation: borderPulse 1.5s infinite;
        }
        @keyframes borderPulse {
            0% { border-color: var(--surface-border); }
            50% { border-color: var(--primary-cyan); }
            100% { border-color: var(--surface-border); }
        }

        /* Footer */
        .site-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .pulse-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #10b981;
        }

        /* Scrollbar Aesthetics */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }

        /* Responsive Mobile Stack fixes */
        @media (max-width: 600px) {
            .app-navbar {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }
            .signature-control {
                width: 100%;
                justify-content: space-between;
            }
            .main-wrapper {
                padding: 15px;
            }
            .glass-card {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <!-- Background ambient environment -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="main-wrapper">
        <!-- Top Header & Logic Settings -->
        <header class="app-navbar">
            <div class="logo-group">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6 6-6"/><path d="m5 12 6 6 6-6"/></svg>
                </div>
                <h1 class="logo-text">Offer Architect</h1>
            </div>

            <div class="signature-control">
                <span class="sig-label">Auto Signature</span>
                <div class="sig-input-wrapper">
                    <span>@</span>
                    <input type="text" id="handleControl" class="sig-input" placeholder="rustedking" spellcheck="false">
                </div>
            </div>
        </header>

        <!-- Dual Panel Engine -->
        <div class="dashboard-grid">
            
            <!-- Left Input Node -->
            <div class="glass-card">
                <div class="card-head">
                    <div class="card-title">
                        <div class="bullet-decor"></div>
                        Construct Prompt
                    </div>
                    <div class="char-pill" id="charIndicator">0 Chars</div>
                </div>

                <textarea id="composerBox" class="editor-textarea" 
                    placeholder="Enter disorganized offer intel here... E.g. 'Selling my 2022 MacBook Pro 14, 16GB RAM, 512GB SSD. Mint condition. Space Gray. Looking for 1400 obo. Located in NYC for pickup only.'"
                    oninput="syncTextMetrics()"></textarea>

                <div class="btn-group">
                    <button id="compileBtn" class="master-btn btn-build" onclick="invokeAIEngine()">
                        <div class="shimmer"></div>
                        <svg id="btnIconStandard" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        <span id="btnLabel">Synthesize Offer</span>
                    </button>
                </div>
            </div>

            <!-- Right Output Node -->
            <div class="glass-card" id="outputNode">
                <div class="card-head">
                    <div class="card-title">
                        <div class="bullet-decor" style="background:#4facfe; box-shadow: 0 0 10px #4facfe;"></div>
                        Neural Output
                    </div>
                </div>

                <div class="output-display" id="terminalFeed">
                    <!-- Initial Placeholder when empty -->
                    <div class="empty-state" id="statusWall">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                        <p>Awaiting Synthesis Data...</p>
                    </div>
                    <!-- Active dynamic text will inject here directly -->
                </div>

                <div class="btn-group">
                    <button id="duplicatorBtn" class="master-btn btn-copy inactive" onclick="executeDuplication()">
                        <svg id="copySvg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        <span id="copyTag">Copy to Buffer</span>
                    </button>
                </div>
            </div>

        </div>

        <footer class="site-footer">
            <div class="pulse-dot"></div>
            Connected to Cloud Neural Grid
        </footer>
    </div>

    <script>
        // AI Context Directive
        const SYSTEM_INSTRUCTION = `You are an elite formatting logic unit for Telegram marketplace deployment. 
OBJECTIVE: Restructure messy user offer data into an extremely clean, structured, high-converting markdown announcement.
REGULATIONS:
1. Use bold headers like **📱 DEVICE NAME** or **💰 ASKING PRICE**.
2. Use professional bullets (•) and selective premium emojis.
3. Output MUST flow: Headline -> Detailed Specs -> Price/Condition -> Terms.
4. Keep text blocks concise and double-spaced.
5. ABSOLUTELY NEVER generated footer links, username tags, or small talk. The engine handles this algorithmically.`;

        // State Management
        const handleInput = document.getElementById('handleControl');
        const writePad = document.getElementById('composerBox');
        const feedWall = document.getElementById('terminalFeed');
        const copyTool = document.getElementById('duplicatorBtn');
        let currentGeneratedBuffer = "";

        // Initial Life-cycle Hook
        document.addEventListener('DOMContentLoaded', () => {
            const memory = localStorage.getItem('user_architect_sig');
            handleInput.value = memory || 'rustedking';
        });

        // Settings Persistence
        handleInput.addEventListener('input', (e) => {
            const cleaned = e.target.value.trim().replace('@', '');
            localStorage.setItem('user_architect_sig', cleaned);
        });

        // Input Counter UI sync
        function syncTextMetrics() {
            document.getElementById('charIndicator').innerText = `${writePad.value.length} Chars`;
        }

        // Primary Action Pipeline
        async function invokeAIEngine() {
            const sourceData = writePad.value.trim();
            const handleStamp = handleInput.value.trim().replace('@', '') || 'rustedking';
            
            const ctaBtn = document.getElementById('compileBtn');
            const iconNode = document.getElementById('btnIconStandard');
            const outputBlock = document.getElementById('outputNode');

            if (!sourceData) {
                triggerShakeSequence(writePad);
                return;
            }

            // UI Engagement Phase
            ctaBtn.disabled = true;
            ctaBtn.innerHTML = `<div class="dual-ring-loader"></div> <span>Synthesizing...</span>`;
            outputBlock.classList.add('active-build-border');
            
            // Reset Output wall
            feedWall.innerHTML = `[SYSTEM INITIALIZED] Establishing uplink...\n[DATA STREAM] Injecting Prompt Payload...`;
            copyTool.classList.add('inactive');

            try {
                const responseObj = await fetch("https://text.pollinations.ai/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: SYSTEM_INSTRUCTION },
                            { role: "user", content: `Construct optimized listing for: ${sourceData}` }
                        ],
                        model: "openai",
                        jsonMode: false
                    })
                });

                if (!responseObj.ok) throw new Error("Neural Uplink Severed");

                const rawReturn = await responseObj.text();
                
                // Assemble the perfect telegram block
                currentGeneratedBuffer = rawReturn.trim() + `\n\n📩 **Contact:** @${handleStamp}`;

                // Direct output rendering with subtle fade in
                feedWall.style.opacity = 0;
                setTimeout(() => {
                    feedWall.innerText = currentGeneratedBuffer;
                    feedWall.style.opacity = 1;
                    // Activate copy utility
                    copyTool.classList.remove('inactive');
                }, 200);

            } catch (fail) {
                feedWall.innerHTML = `<span style="color:#ef4444;">[CRITICAL FAILURE] Pipeline disruption occurred. Please reload matrix or verify connection.</span>`;
                console.error(fail);
            } finally {
                // Reset and cooldown
                setTimeout(() => {
                    outputBlock.classList.remove('active-build-border');
                    ctaBtn.innerHTML = `<div class="shimmer"></div><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Synthesize Offer`;
                    ctaBtn.disabled = false;
                }, 300);
            }
        }

        // UX Feedback - Shake empty field
        function triggerShakeSequence(node) {
            node.style.borderColor = "#ef4444";
            node.animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(6px)' },
                { transform: 'translateX(-6px)' },
                { transform: 'translateX(0)' }
            ], { duration: 400, iterations: 1 });
            setTimeout(() => { node.style.borderColor = ""; }, 1500);
        }

        // Clipboard API flow
        async function executeDuplication() {
            if(copyTool.classList.contains('inactive')) return;

            const originalText = document.getElementById('copyTag').innerText;
            const originalSvg = document.getElementById('copySvg').outerHTML;

            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(currentGeneratedBuffer);
                } else {
                    // Fast legacy creation and execution
                    const hiddenProxy = document.createElement("textarea");
                    hiddenProxy.value = currentGeneratedBuffer;
                    document.body.appendChild(hiddenProxy);
                    hiddenProxy.select();
                    document.execCommand("copy");
                    document.body.removeChild(hiddenProxy);
                }
                
                // Visual transformation for success
                copyTool.classList.add('success-anim');
                document.getElementById('copyTag').innerText = "Buffer Synchronized!";
                document.getElementById('duplicatorBtn').innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17 4 12"/></svg> <span>Secured in Clipboard</span>`;

                setTimeout(() => {
                    copyTool.classList.remove('success-anim');
                    document.getElementById('duplicatorBtn').innerHTML = `${originalSvg} <span id="copyTag">${originalText}</span>`;
                }, 2500);

            } catch (err) {
                alert("Hardware context limitation: Unable to automate copy. Please manually highlight and copy.");
            }
        }
    </script>
</body>

</html>
